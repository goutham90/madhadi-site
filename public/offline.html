<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b2e4f" />
  <title>Offline · madhadi.com</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff; color: #1b1f23; min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .badge { width: 72px; height: 72px; margin-bottom: 1.4rem; }
    h1 { font-size: 1.5rem; color: #0b2e4f; margin-bottom: 0.6rem; letter-spacing: -0.02em; }
    p { font-size: 1.02rem; line-height: 1.6; color: #4a5158; max-width: 42ch; margin-bottom: 0.6rem; }
    .hint { font-size: 0.9rem; color: #6b7076; margin-top: 1rem; }
    button { margin-top: 1.6rem; background: #005ea2; color: #fff; border: 0; font-size: 0.95rem;
      font-weight: 600; padding: 0.7rem 1.4rem; border-radius: 8px; cursor: pointer; }
    button:hover { background: #004a80; }
  </style>
</head>
<body>
  <img class="badge" src="/icons/icon-192.png" alt="madhadi.com" width="72" height="72" />
  <h1>You are offline</h1>
  <p>This page has not been saved for offline reading yet. Pages you have already opened are available without a connection.</p>
  <p class="hint">Reconnect, then reload to keep reading.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
