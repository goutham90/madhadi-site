<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Equipment qualification">
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- instrument gauge dial -->
    <circle cx="32" cy="32" r="22" />
    <circle cx="32" cy="32" r="2.2" />
    <!-- calibration tick scale (major ticks) -->
    <line x1="32" y1="12" x2="32" y2="16" />
    <line x1="52" y1="32" x2="48" y2="32" />
    <line x1="32" y1="52" x2="32" y2="48" />
    <line x1="12" y1="32" x2="16" y2="32" />
    <!-- minor calibration ticks (upper arc) -->
    <line x1="22.5" y1="14.5" x2="24" y2="17.5" />
    <line x1="41.5" y1="14.5" x2="40" y2="17.5" />
    <line x1="49.5" y1="22.5" x2="46.5" y2="24" />
    <line x1="49.5" y1="41.5" x2="46.5" y2="40" />
    <!-- needle pointing to calibrated mark -->
    <line x1="32" y1="32" x2="44" y2="22" />
  </g>
</svg>
