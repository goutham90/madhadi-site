<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Computer system validation">
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- monitor / system box -->
    <rect x="8" y="12" width="40" height="28" rx="2" />
    <!-- screen header line -->
    <line x1="8" y1="19" x2="48" y2="19" />
